server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dailyq?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 微信小程序配置
wechat:
  miniapp:
    appid: your-appid
    secret: your-secret

# JWT配置
jwt:
  secret: DailyQSecretKeyForJwtTokenGeneration2024
  expiration: 604800000  # 7天 7*24*60*60*1000

# 文件上传配置
file:
  upload:
    path: ./uploads/
    url-prefix: http://localhost:8080/uploads/

# 日志配置
logging:
  level:
    com.dailyq: DEBUG
    org.hibernate.SQL: DEBUG
